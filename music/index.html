<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Nisekana</title>
    <meta name="description" content="一个简单好用的音乐播放器。">
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --apple-pink: #FA233B;
            --color-1: 30, 30, 30;
            --color-2: 60, 60, 60;
            --color-3: 10, 10, 10;
            --right-width: 50%; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        /* 动态背景 */
        #ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
            background-color: rgb(var(--color-3));
            transition: background-color 1.5s ease;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.7;
            border-radius: 50%;
            animation: moveBlobs 25s infinite alternate ease-in-out;
            transition: background-color 1.5s ease;
        }

        .blob-1 { top: -10%; left: -10%; width: 80vw; height: 80vw; background-color: rgb(var(--color-1)); }
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background-color: rgb(var(--color-2)); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 60vw; height: 60vw; background-color: rgb(var(--color-1)); opacity: 0.4; animation-delay: -10s; }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.04; z-index: -1; pointer-events: none;
        }

        .dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.2); z-index: -1; pointer-events: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .cover-shadow {
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .playing-cover {
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(1);
            cursor: pointer;
        }
        .playing-cover.paused {
            transform: scale(0.82);
            filter: brightness(0.7);
        }

        #lyrics-view {
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .lyric-line {
            transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
            padding: 16px 0;
            opacity: 0.3;
            transform: scale(0.95);
            transform-origin: left center;
            cursor: pointer;
        }

        .lyric-line:hover {
            opacity: 0.6;
        }

        .lyric-line.active {
            opacity: 1 !important;
            transform: scale(1.08);
        }

        .lyric-line.active .original-text { color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .lyric-line.active .translation-text { color: rgba(255,255,255,0.8); }

        .original-text { font-size: 2.2rem; font-weight: 800; line-height: 1.2; display: block; }
        .translation-text { font-size: 1.4rem; font-weight: 600; margin-top: 8px; display: block; color: rgba(255,255,255,0.5); }

        @media (max-width: 1024px) {
            .original-text { font-size: 1.6rem; }
            .translation-text { font-size: 1.1rem; }
        }

        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; margin-top: -4px; opacity: 0; transition: opacity 0.2s; }
        .progress-container:hover input[type=range]::-webkit-slider-thumb { opacity: 1; }

        .player-container {
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #right-panels {
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            width: var(--right-width);
            max-width: var(--right-width);
        }

        .view-panel {
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateX(0);
        }

        .view-panel.hidden-panel {
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
        }

        .playlist-item {
            transition: background-color 0.2s ease;
        }
        .playlist-item:hover {
            background-color: rgba(255, 255, 255, 0.06) !important;
        }
        .playlist-item.active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .playlist-item .song-index {
            width: 24px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
        }
        .playlist-item.active .song-index {
            color: var(--apple-pink);
        }

        .btn-active {
            color: white !important;
            opacity: 1 !important;
            transform: scale(1.1);
        }

        /* 歌单选择面板 */
        #playlist-select-view {
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ps-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
        }
        .ps-card:hover {
            background: rgba(255,255,255,0.1);
        }
        .ps-card .ps-cover {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .ps-card .ps-info { flex: 1; min-width: 0; }
        .ps-card .ps-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ps-card .ps-meta { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
        .ps-card .ps-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .ps-card .ps-actions button {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .ps-card .ps-btn-play { background: rgba(255,255,255,0.12); color: white; }
        .ps-card .ps-btn-play:hover { background: rgba(255,255,255,0.2); }
        .ps-card .ps-btn-del { background: rgba(255,60,60,0.15); color: #ff6b6b; }
        .ps-card .ps-btn-del:hover { background: rgba(255,60,60,0.3); }

        .ps-add-card {
            background: rgba(255,255,255,0.03);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 16px;
            transition: all 0.3s ease;
        }
        .ps-add-card:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.06);
        }

        /* 添加歌单表单覆盖层 */
        #add-playlist-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #add-playlist-overlay.visible {
            opacity: 1; pointer-events: auto;
        }
        #add-playlist-form {
            background: rgba(30,30,30,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 28px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #add-playlist-overlay.visible #add-playlist-form {
            transform: scale(1) translateY(0);
        }
        #add-playlist-form input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }
        #add-playlist-form input:focus {
            border-color: rgba(255,255,255,0.3);
        }
        #add-playlist-form input::placeholder { color: rgba(255,255,255,0.3); }
        #add-playlist-form .form-btns { display: flex; gap: 10px; margin-top: 8px; }
        #add-playlist-form .form-btns button {
            flex: 1; padding: 12px; border-radius: 12px; font-weight: 700;
            font-size: 0.95rem; border: none; cursor: pointer; transition: all 0.2s;
        }

        /* ==============================
            移动端专属布局 (≤1023px)
           ============================== */
        @media (max-width: 1023px) {
            /* 隐藏桌面端右侧面板 */
            #right-panels { display: none !important; }

            /* 封面区域：固定减去控件区高度，封面自然填满 */
            #cover-area {
                position: relative;
                flex: none;
                height: calc(100vh - 280px);
                min-height: 180px;
            }

            /* 封面图片按区域自适应，与控件同宽 */
            #cover-img {
                width: auto !important;
                height: auto !important;
                max-width: min(480px, 85%) !important;
                max-height: 85% !important;
                object-fit: contain;
            }

            /* 覆盖 Tailwind hidden：面板始终 flex 布局，用 opacity 控制可见性 */
            #mobile-lyrics-wrap,
            #mobile-playlist-wrap,
            #mobile-ps-wrap {
                display: flex !important;
                flex-direction: column;
            }

            /* 封面默认显示，始终 flex（动画不用 display） */
            #mobile-cover-wrap {
                display: flex !important;
                transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
            }

            /* 歌词 / 播放列表 / 歌单选择：绝对定位覆盖在封面区域，初始隐藏 */
            #mobile-lyrics-wrap,
            #mobile-playlist-wrap,
            #mobile-ps-wrap {
                position: absolute;
                inset: 0;
                z-index: 5;
                -webkit-backdrop-filter: blur(8px);
                opacity: 0;
                transform: translateY(20px) scale(0.96);
                pointer-events: none;
                transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.4s cubic-bezier(0.4,0,0.2,1);
            }

            /* 激活态：封面淡出缩小，面板淡入上滑 */
            #left-player.mobile-lyrics-active #mobile-cover-wrap,
            #left-player.mobile-playlist-active #mobile-cover-wrap {
                opacity: 0;
                transform: scale(0.92);
                pointer-events: none;
            }
            #left-player.mobile-lyrics-active #mobile-lyrics-wrap {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }
            #left-player.mobile-playlist-active #mobile-playlist-wrap {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }
            #left-player.mobile-playlist-active.mobile-ps-active #mobile-playlist-wrap {
                opacity: 0;
                transform: translateY(0) scale(0.96);
                pointer-events: none;
            }
            #left-player.mobile-playlist-active.mobile-ps-active #mobile-ps-wrap {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }

            /* 歌词滚动区 mask */
            #mobile-lyrics-scroll {
                mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 85%, transparent 100%);
                -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 85%, transparent 100%);
            }

            /* 移动端歌词行样式（继承桌面端 .lyric-line） */
            #mobile-lyrics-content .lyric-line .original-text { font-size: 1.4rem; font-weight: 700; }
            #mobile-lyrics-content .lyric-line .translation-text { font-size: 1rem; }

            /* 控制区紧凑化 */
            #left-player .max-w-\[480px\] h1 { font-size: 1.1rem !important; }
            #left-player .max-w-\[480px\] h2 { font-size: 0.85rem !important; }
            #left-player .max-w-\[480px\] .group.progress-container { margin-bottom: 0.5rem !important; }

            /* 按钮区域缩小 */
            #left-player .max-w-\[480px\] button#btn-play { width: 60px; height: 60px; font-size: 1.5rem; }
            #left-player .max-w-\[480px\] button#btn-prev,
            #left-player .max-w-\[480px\] button#btn-next { font-size: 1.75rem; }

            /* 隐藏品牌行 */
            #left-player > .flex.items-center.gap-3 { display: none; }

            /* 播放列表项紧凑 */
            #mobile-playlist-list .playlist-item { padding: 0.6rem 0.75rem; gap: 0.75rem; }
            #mobile-playlist-list .playlist-item img { width: 2.5rem; height: 2.5rem; }

            /* 移动端歌单卡片网格 */
            #mobile-ps-grid {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 0 4px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="main-layout" class="flex flex-col lg:flex-row h-screen w-screen overflow-hidden">
        <div id="ambient-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>
        <div class="noise-overlay"></div>
        <div class="dark-overlay"></div>

        <!-- Left Player UI -->
        <div id="left-player" class="player-container w-full lg:w-1/2 h-full flex flex-col justify-between p-8 lg:p-10 z-10 mx-auto">
            <div class="flex items-center gap-3 text-white/40 font-bold tracking-widest text-xs">
                <i class="fa-solid fa-compact-disc animate-spin-slow"></i> KUIMUSIC
            </div>

            <!-- 封面区：移动端上半区，桌面端居中 -->
            <div class="flex-1 flex items-center justify-center relative" id="cover-area">
                <div id="mobile-cover-wrap" class="flex items-center justify-center w-full h-full">
                    <img id="cover-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                        class="w-48 h-48 md:w-72 md:h-72 lg:w-[420px] lg:h-[420px] object-cover rounded-2xl cover-shadow playing-cover paused">
                </div>
                <!-- 移动端歌词（桌面端隐藏，桌面用右侧面板） -->
                <div id="mobile-lyrics-wrap" class="hidden absolute inset-0 flex-col items-stretch">
                    <div id="mobile-lyrics-scroll" class="max-w-[480px] mx-auto w-full flex-1 overflow-y-auto no-scrollbar">
                        <div class="h-[15vh]"></div>
                        <div id="mobile-lyrics-content"></div>
                        <div class="h-[30vh]"></div>
                    </div>
                </div>
                <!-- 移动端播放列表（桌面端隐藏） -->
                <div id="mobile-playlist-wrap" class=" max-w-[480px] mx-auto w-full hidden absolute inset-0 flex-col items-stretch pt-8">
                    <div class="mb-4 flex justify-between items-center flex-shrink-0">
                        <div>
                            <h3 class="text-2xl font-black">播放列表</h3>
                            <p id="mobile-playlist-count" class="text-white/40 text-sm mt-0.5"></p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button id="btn-mobile-ps-select" class="text-white/30 hover:text-white text-xl p-2 transition-all" title="歌单管理">
                                <i class="fas fa-rectangle-list"></i>
                            </button>
                            <button id="btn-mobile-order" class="text-white/30 hover:text-white text-xl p-2 transition-all" title="切换播放模式">
                                <i class="fas fa-repeat"></i>
                            </button>
                        </div>
                    </div>
                    <div id="mobile-playlist-list" class="flex-1 overflow-y-auto no-scrollbar space-y-1 pb-4"></div>
                </div>
                <!-- 移动端歌单选择面板 -->
                <div id="mobile-ps-wrap" class="hidden max-w-[480px] mx-auto w-full">
                    <div class="mb-4 flex justify-between items-center flex-shrink-0 px-1">
                        <div>
                            <h3 class="text-2xl font-black">歌单管理</h3>
                            <p class="text-white/40 text-sm mt-0.5">选择或添加歌单</p>
                        </div>
                        <button id="btn-mobile-ps-back" class="text-white/30 hover:text-white text-xl p-2 transition-all" title="返回">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </div>
                    <div id="mobile-ps-grid" class="flex-1 overflow-y-auto no-scrollbar pb-4"></div>
                </div>
            </div>

            <div class="max-w-[480px] mx-auto w-full">
                <div class="flex justify-between items-end mb-6">
                    <div class="flex-1 min-w-0 pr-6">
                        <h1 id="song-title" class="text-2xl lg:text-4xl font-black truncate text-white">加载中...</h1>
                        <h2 id="song-artist" class="text-lg lg:text-xl font-bold text-white/50 truncate mt-1">请稍候</h2>
                    </div>
                </div>

                <div class="mb-8 group progress-container">
                    <div class="relative w-full h-1 flex items-center">
                        <div id="progress-fill" class="absolute h-full bg-white rounded-full z-10 pointer-events-none" style="width: 0%"></div>
                        <input type="range" id="progress-bar" class="w-full relative z-20" min="0" max="100" value="0">
                    </div>
                    <div class="flex justify-between mt-3 text-xs font-bold text-white/30">
                        <span id="time-current">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <button id="btn-show-lyrics" class="text-white/30 hover:text-white text-xl transition-all" title="显示歌词">
                        <i class="fas fa-quote-right"></i>
                    </button>
                    <button id="btn-prev" class="text-white/80 hover:text-white text-4xl"><i class="fas fa-backward-step"></i></button>
                    <button id="btn-play" class="w-20 h-20 rounded-full bg-white text-black flex items-center justify-center text-3xl hover:scale-105 transition active:scale-95 shadow-2xl">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <button id="btn-next" class="text-white/80 hover:text-white text-4xl"><i class="fas fa-forward-step"></i></button>
                    <button id="btn-show-playlist" class="text-white/30 hover:text-white text-xl transition-all" title="播放列表">
                        <i class="fas fa-list-ul"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panels -->
        <div id="right-panels" class="h-full z-10 relative overflow-hidden flex">
            <!-- Lyrics Panel -->
            <div id="lyrics-view" class="view-panel h-full w-full overflow-y-auto no-scrollbar p-8 lg:p-24 absolute inset-0">
                <div class="h-[40vh]"></div>
                <div id="lyrics-content" class="pb-[50vh]"></div>
            </div>

            <!-- Playlist Panel -->
            <div id="playlist-view" class="view-panel hidden-panel h-full w-full p-8 lg:p-24 flex flex-col absolute inset-0">
                <div class="mb-10 flex justify-between items-center">
                    <div>
                        <h3 class="text-4xl font-black mb-2">播放列表</h3>
                        <p id="playlist-count" class="text-white/40 font-medium">获取中...</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="btn-ps-select" class="text-white/30 hover:text-white text-2xl p-2 transition-all" title="歌单管理">
                            <i class="fas fa-rectangle-list"></i>
                        </button>
                        <button id="btn-order" class="text-white/30 hover:text-white text-2xl p-2 transition-all" title="切换播放模式">
                            <i class="fas fa-repeat"></i>
                        </button>
                    </div>
                </div>
                <div id="playlist-list" class="flex-1 overflow-y-auto no-scrollbar space-y-2 pb-20"></div>
            </div>

            <!-- Playlist Selection Panel (Desktop) -->
            <div id="playlist-select-view" class="view-panel hidden-panel h-full w-full p-8 lg:p-24 flex flex-col absolute inset-0">
                <div class="mb-10 flex justify-between items-center">
                    <div>
                        <h3 class="text-4xl font-black mb-2">歌单管理</h3>
                        <p class="text-white/40 font-medium">选择或添加歌单</p>
                    </div>
                    <button id="btn-ps-back" class="text-white/30 hover:text-white text-2xl p-2 transition-all" title="返回播放列表">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div id="ps-grid" class="flex-1 overflow-y-auto no-scrollbar pb-20 space-y-3"></div>
            </div>
        </div>

        <audio id="audio-player" crossorigin="anonymous"></audio>
    </div>

    <!-- 添加歌单弹窗 -->
    <div id="add-playlist-overlay">
        <div id="add-playlist-form">
            <h3 class="text-xl font-black mb-5">添加歌单</h3>
            <input type="text" id="ap-input-id" placeholder="网易云歌单 ID" inputmode="numeric">

            <div class="form-btns">
                <button id="ap-cancel" style="background:rgba(255,255,255,0.08);color:white;">取消</button>

<script>
        // 全岛配置对象：包含 API 基准地址、音乐平台（网易云）和目标歌单 ID
        const CONFIG = {
            apiBase: "https://api.qijieya.cn/meting/",
            server: "netease",
            type: "playlist",

        // 实例化 ColorThief 库，用于从封面图片提取主色调以生成动态主题
        const colorThief = new ColorThief();

        // 应用状态管理：存储播放列表、当前索引、播放状态、歌词、播放模式等
        const state = {
            playlist: [],
            currentIndex: 0,

            lyrics: [],
            activeIdx: -1,
            showLyrics: false,
            showPlaylist: false,
            showPlaylistSelect: false,
            playMode: 'list',
            savedPlaylists: [],      // 用户保存的歌单 [{id, name, count, cover}]
            currentPlaylistId: null  // 当前播放的歌单 ID

        // DOM 元素引用集合：统一管理页面上的音频标签、控制按钮、信息展示区等

            cover: document.getElementById('cover-img'),
            playBtn: document.getElementById('btn-play'),
            nextBtn: document.getElementById('btn-next'),
            prevBtn: document.getElementById('btn-prev'),
            progress: document.getElementById('progress-bar'),
            progressFill: document.getElementById('progress-fill'),
            timeCur: document.getElementById('time-current'),
            timeTotal: document.getElementById('time-total'),
            lrcContent: document.getElementById('lyrics-content'),
            lrcView: document.getElementById('lyrics-view'),
            playlistView: document.getElementById('playlist-view'),
            playlistList: document.getElementById('playlist-list'),
            playlistCount: document.getElementById('playlist-count'),
            lyricsBtn: document.getElementById('btn-show-lyrics'),
            playlistBtn: document.getElementById('btn-show-playlist'),
            orderBtn: document.getElementById('btn-order'),
            leftPlayer: document.getElementById('left-player'),
            rightPanels: document.getElementById('right-panels'),
            // 移动端元素
            mobileLrcWrap: document.getElementById('mobile-lyrics-wrap'),
            mobileLrcContent: document.getElementById('mobile-lyrics-content'),
            mobileLrcScroll: document.getElementById('mobile-lyrics-scroll'),
            mobilePlaylistWrap: document.getElementById('mobile-playlist-wrap'),
            mobilePlaylistList: document.getElementById('mobile-playlist-list'),
            mobilePlaylistCount: document.getElementById('mobile-playlist-count'),
            mobileOrderBtn: document.getElementById('btn-mobile-order'),
            coverArea: document.getElementById('cover-area'),
            // 歌单选择
            psSelectView: document.getElementById('playlist-select-view'),
            psGrid: document.getElementById('ps-grid'),
            psSelectBtn: document.getElementById('btn-ps-select'),
            psBackBtn: document.getElementById('btn-ps-back'),
            mobilePsWrap: document.getElementById('mobile-ps-wrap'),
            mobilePsGrid: document.getElementById('mobile-ps-grid'),
            mobilePsSelectBtn: document.getElementById('btn-mobile-ps-select'),
            mobilePsBackBtn: document.getElementById('btn-mobile-ps-back'),
            // 添加歌单弹窗
            apOverlay: document.getElementById('add-playlist-overlay'),
            apInputId: document.getElementById('ap-input-id'),
            apInputName: document.getElementById('ap-input-name'),
            apCancel: document.getElementById('ap-cancel'),
            apConfirm: document.getElementById('ap-confirm')
        };

        // 判断是否为移动端
        const isMobile = () => window.innerWidth <= 1023;

        /**
         * 请求 Meting API 获取数据
         * @param {string} type - 请求类型 ('playlist', 'lrc', 'url', 'pic' 等)
         * @param {string} id - 对应的歌曲或歌单 ID
         * @param {string} server - 音乐平台标识
         */
        async function fetchMeting(type, id, server = CONFIG.server) {
            const url = `${CONFIG.apiBase}?server=${server}&type=${type}&id=${id}`;
            const res = await fetch(url);
            if (type === 'lrc') return res.text(); // 歌词返回纯文本
            return res.json(); // 其他返回 JSON 格式
        }

        /**
         * 获取高分辨率图片地址
         * 处理 API 返回的缩略图链接，通过 HEAD 请求或字符串替换获取原始大图
         * @param {string} url - 原始图片 URL
         */
        async function getHighResPic(url) {
            if (!url) return "";
            let finalUrl = url;
            if (url.includes('type=pic')) {
                try {
                    // 发起 HEAD 请求以跟随重定向获取最终真实 URL
                    const response = await fetch(url, { method: 'HEAD' });
                    finalUrl = response.url;
                } catch (e) {
                    console.warn("获取真实封面地址失败", e);
                }
            }
            // 移除网易云图片参数并强制使用 HTTPS
            return finalUrl.split('?param=')[0].replace('http://', 'https://');
        }

        /**
         * 初始化播放器
         * 加载歌单数据、渲染列表、加载首支歌曲并绑定事件
         */
        async function init() {
            loadSavedPlaylists(); // 加载已保存的歌单列表（先于歌曲加载，用于判断恢复哪个歌单）

            const restored = restorePlayerState();
            let startTrackIndex = 0;

            // 恢复播放模式
            if (restored?.playMode && ['list', 'random', 'single'].includes(restored.playMode)) {
                state.playMode = restored.playMode;
                const modes = ['list', 'random', 'single'];
                const icons = ['fa-repeat', 'fa-shuffle', 'fa-arrows-rotate'];
                const idx = modes.indexOf(state.playMode);
                [dom.orderBtn, dom.mobileOrderBtn].forEach(b => {
                    b.innerHTML = `<i class="fas ${icons[idx]}"></i>`;
                });
            }

            // 决定加载哪个歌单
            let targetPlaylistId = CONFIG.id;
            if (restored?.currentPlaylistId && state.savedPlaylists.find(p => p.id === restored.currentPlaylistId)) {
                targetPlaylistId = restored.currentPlaylistId;
                CONFIG.id = targetPlaylistId;
            }

            try {
                const data = await fetchMeting(CONFIG.type, targetPlaylistId);
                state.playlist = Array.isArray(data) ? data : [data];
                state.currentPlaylistId = targetPlaylistId;

                // 恢复歌曲索引
                if (restored?.currentIndex != null && restored.currentIndex >= 0 && restored.currentIndex < state.playlist.length) {
                    startTrackIndex = restored.currentIndex;
                }

                dom.playlistCount.textContent = `即将播放 ${state.playlist.length} 首歌曲`;
                dom.mobilePlaylistCount.textContent = `${state.playlist.length} 首歌曲`;
                renderPlaylist();
                loadTrack(startTrackIndex);
            } catch (e) {
                console.error(e);
                dom.title.textContent = "配置加载失败";
            }
            setupEvents(); // 绑定交互事件
            updateLayout(); // 初始化布局显示
        }

        /**
         * 加载指定索引的歌曲轨道
         * 获取歌曲链接、歌词、封面，并更新媒体会话和 UI
         * @param {number} index - 歌曲在列表中的索引
         * @param {boolean} autoPlay - 加载后是否立即尝试播放
         */
        async function loadTrack(index, autoPlay = false) {
            state.currentIndex = index;
            const track = state.playlist[index];
            dom.title.textContent = track.name || track.title;
            dom.artist.textContent = track.artist || "未知歌手";
            
            try {
                const picUrl = await getHighResPic(track.pic);
                updateUITheme(picUrl); // 根据封面颜色更新主题
                
                // 设置系统媒体通知栏控制元数据
                updateMediaSession(track, picUrl);

                // 获取并设置音频源
                let songUrl = track.url;
                if (!songUrl) {
                    const urlData = await fetchMeting('url', track.id);
                    songUrl = urlData.url;
                }
                if (songUrl) dom.audio.src = songUrl.replace('http://', 'https://');

                // 获取并解析歌词
                let lrcText = "";
                if (track.lrc && track.lrc.startsWith('http')) {
                    const lrcRes = await fetch(track.lrc);
                    lrcText = await lrcRes.text();
                } else {
                    lrcText = await fetchMeting('lrc', track.id);
                }
                
                parseLyrics(lrcText);
                renderLyrics();

                // 处理自动播放逻辑
                if (state.isPlaying || autoPlay) {
                    dom.audio.play().catch(e => console.warn("播放被拦截:", e));
                }
                updatePlaylistActive(); // 更新列表中当前播放项的高亮显示
                savePlayerState(); // 保存当前播放状态到本地
            } catch (err) {
                console.error("加载轨道失败", err);
            }
        }

        /**
         * 更新浏览器/操作系统级别的媒体控制中心 (Media Session API)
         * 允许用户通过锁屏或耳机控制播放
         */
        function updateMediaSession(track, picUrl) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: track.name || track.title,
                    artist: track.artist,
                    album: 'KUIMusic',
                    artwork: [
                        { src: picUrl, sizes: '96x96',   type: 'image/png' },
                        { src: picUrl, sizes: '128x128', type: 'image/png' },
                        { src: picUrl, sizes: '192x192', type: 'image/png' },
                        { src: picUrl, sizes: '256x256', type: 'image/png' },
                        { src: picUrl, sizes: '384x384', type: 'image/png' },
                        { src: picUrl, sizes: '512x512', type: 'image/png' },
                    ]
                });

                // 绑定操作系统媒体键的操作指令
                navigator.mediaSession.setActionHandler('play', () => dom.audio.play());
                navigator.mediaSession.setActionHandler('pause', () => dom.audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => dom.prevBtn.click());
                navigator.mediaSession.setActionHandler('nexttrack', () => dom.nextBtn.click());
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    dom.audio.currentTime = details.seekTime;
                });
            }
        }

        /**
         * 更新 UI 主题色
         * 加载图片并使用 ColorThief 提取色彩，应用到 CSS 变量中
         * @param {string} url - 封面图片地址
         */
        function updateUITheme(url) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            img.onload = () => {
                dom.cover.src = url;
                try {
                    // 获取封面调色板（前 3 个主色）
                    const palette = colorThief.getPalette(img, 3);
                    document.documentElement.style.setProperty('--color-1', palette[0].join(','));
                    document.documentElement.style.setProperty('--color-2', palette[1].join(','));
                    document.documentElement.style.setProperty('--color-3', palette[2].join(','));
                } catch (e) {}
            };
            img.onerror = () => {
                dom.cover.src = "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=1000&auto=format&fit=crop";
            };
        }

        // /**
        //  * 解析 LRC 格式的歌词文本
        //  * 将时间戳字符串转换为秒数，并与歌词文本配对存储到 state.lyrics
        //  * @param {string} lrc - 原始 LRC 歌词文本
        //  */
        // function parseLyrics(lrc) {
        //     state.lyrics = [];
        //     if (!lrc || typeof lrc !== 'string' || lrc.includes('{"status":false')) return;
        //     const lines = lrc.split('\n');
        //     const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/; // 匹配 [mm:ss.ms]
        //     lines.forEach(l => {
        //         const match = timeExp.exec(l);
        //         if (match) {
        //             const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / (match[3].length === 3 ? 1000 : 100);
        //             const text = l.replace(timeExp, '').trim();
        //             if (text) state.lyrics.push({ time, text });
        //         }
        //     });
        // }

        // /**
        //  * 渲染歌词面板
        //  * 将解析后的歌词生成 HTML 元素，并绑定歌词点击跳转播放进度的功能
        //  */
        // function renderLyrics() {
        //     if (state.lyrics.length === 0) {
        //         dom.lrcContent.innerHTML = '<div class="lyric-line active"><span class="original-text">暂无歌词</span></div>';
        //         return;
        //     }
        //     dom.lrcContent.innerHTML = state.lyrics.map((l, i) => `
        //         <div class="lyric-line" id="lrc-${i}" data-time="${l.time}">
        //             <span class="original-text">${l.text}</span>
        //         </div>
        //     `).join('');
            
        //     dom.lrcContent.querySelectorAll('.lyric-line').forEach(el => {
        //         el.onclick = () => {
        //             const time = parseFloat(el.getAttribute('data-time'));
        //             dom.audio.currentTime = time;
        //             if (dom.audio.paused) dom.audio.play();
        //         };
        //     });

        //     state.activeIdx = -1; // 重置当前活跃歌词索引
        // }

/**
         * 解析 LRC 格式的歌词文本
         * 增加对行内括号翻译歌词的识别
         * @param {string} lrc - 原始 LRC 歌词文本
         */
        function parseLyrics(lrc) {
            state.lyrics = [];
            if (!lrc || typeof lrc !== 'string' || lrc.includes('{"status":false')) return;
            const lines = lrc.split('\n');
            const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/; // 匹配 [mm:ss.ms]
            
            lines.forEach(l => {
                const match = timeExp.exec(l);
                if (match) {
                    const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / (match[3].length === 3 ? 1000 : 100);
                    let text = l.replace(timeExp, '').trim();
                    
                    if (text) {
                        let original = text;
                        let translation = "";

                        // 识别逻辑：如果以“)”或“）”结尾，尝试匹配前面的“(”或“（”
                        // 兼容中英文括号
                        const transMatch = text.match(/^(.*)[\(\（](.*)[\)\）]$/);
                        if (transMatch) {
                            original = transMatch[1].trim();
                            translation = transMatch[2].trim();
                        }

                        state.lyrics.push({ time, text: original, trans: translation });
                    }
                }
            });
        }

        /**
         * 渲染歌词面板
         * 增加对翻译歌词字段的处理
         */
        function renderLyrics() {
            const buildHtml = (lyrics) => {
                if (lyrics.length === 0) return '<div class="lyric-line active"><span class="original-text">暂无歌词</span></div>';
                return lyrics.map((l, i) => `
                    <div class="lyric-line" data-time="${l.time}" data-idx="${i}">
                        <span class="original-text">${l.text}</span>
                        ${l.trans ? `<span class="translation-text">${l.trans}</span>` : ''}
                    </div>
                `).join('');
            };

            // 切歌时重置滚动位置，避免新歌词显示在旧位置
            dom.lrcView.scrollTop = 0;
            dom.mobileLrcScroll.scrollTop = 0;

            // 桌面端歌词
            dom.lrcContent.innerHTML = buildHtml(state.lyrics);
            bindLyricClicks(dom.lrcContent, dom.lrcView);

            // 移动端歌词（同步内容）
            dom.mobileLrcContent.innerHTML = buildHtml(state.lyrics);
            bindLyricClicks(dom.mobileLrcContent, dom.mobileLrcScroll);

            state.activeIdx = -1;
        }

        function bindLyricClicks(container, scrollEl) {
            container.querySelectorAll('.lyric-line').forEach(el => {
                el.onclick = () => {
                    const time = parseFloat(el.getAttribute('data-time'));
                    dom.audio.currentTime = time;
                    if (dom.audio.paused) dom.audio.play();
                };
            });
        }

        /**
         * 渲染播放列表面板
         * 循环歌单数组，生成 HTML 列表并绑定点击切歌事件
         */
        function renderPlaylist() {
            const buildPlaylistHtml = (playlist) => {
                return playlist.map((t, i) => {
                    const picUrl = t.pic ? t.pic.replace('http://', 'https://') : "";
                    return `
                        <div class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer playlist-item" data-index="${i}">
                            <div class="song-index">${(i + 1).toString().padStart(2, '0')}</div>
                            <div class="relative w-12 h-12 flex-shrink-0">
                                <img src="${picUrl}" class="w-full h-full object-cover rounded-lg shadow-lg bg-white/5" onerror="this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&auto=format&fit=crop'">
                            </div>
                            <div class="flex-1 truncate">
                                <div class="font-bold truncate song-name text-white">${t.name || t.title}</div>
                                <div class="text-xs opacity-50 truncate mt-0.5">${t.artist}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            const bindPlaylistClicks = (container) => {
                container.querySelectorAll('.playlist-item').forEach(el => {
                    el.onclick = () => loadTrack(parseInt(el.dataset.index), true);
                });
            };

            // 桌面端
            dom.playlistList.innerHTML = buildPlaylistHtml(state.playlist);
            bindPlaylistClicks(dom.playlistList);

            // 移动端
            dom.mobilePlaylistList.innerHTML = buildPlaylistHtml(state.playlist);
            bindPlaylistClicks(dom.mobilePlaylistList);

            updatePlaylistActive();
        }

        /**
         * 更新列表中歌曲的活跃状态
         * 高亮显示当前正在播放的歌曲项
         */
        function updatePlaylistActive() {
            [dom.playlistList, dom.mobilePlaylistList].forEach(list => {
                list.querySelectorAll('.playlist-item').forEach((item, i) => {
                    const nameEl = item.querySelector('.song-name');
                    if (i === state.currentIndex) {
                        item.classList.add('active');
                        nameEl.style.color = 'var(--apple-pink)';
                    } else {
                        item.classList.remove('active');
                        nameEl.style.color = 'white';
                    }
                });
            });
        }

        // ==================== 歌单管理 ====================

        /** 从 localStorage 加载已保存的歌单 */
        function loadSavedPlaylists() {
            try {
                const saved = localStorage.getItem('kuimusic_playlists');
                if (saved) state.savedPlaylists = JSON.parse(saved);
            } catch (e) { state.savedPlaylists = []; }
            // 确保当前默认歌单在列表中
            if (!state.savedPlaylists.find(p => p.id === CONFIG.id)) {
                state.savedPlaylists.unshift({
                    id: CONFIG.id,
                    name: '默认歌单',
                    count: state.playlist.length || '—',
                    cover: state.playlist[0]?.pic?.replace('http://', 'https://') || ''
                });
            }
            state.currentPlaylistId = state.currentPlaylistId || CONFIG.id;
            saveSavedPlaylists();
        }

        /** 保存歌单列表到 localStorage */
        function saveSavedPlaylists() {
            try { localStorage.setItem('kuimusic_playlists', JSON.stringify(state.savedPlaylists)); } catch (e) {}
        }

        /** 保存播放器状态到 localStorage */
        function savePlayerState() {
            try {
                localStorage.setItem('kuimusic_state', JSON.stringify({
                    currentPlaylistId: state.currentPlaylistId,
                    currentIndex: state.currentIndex,
                    playMode: state.playMode,
                    trackName: state.playlist[state.currentIndex]?.name || state.playlist[state.currentIndex]?.title || ''
                }));
            } catch (e) {}
        }

        /** 从 localStorage 恢复播放器状态 */
        function restorePlayerState() {
            try {
                const saved = localStorage.getItem('kuimusic_state');
                if (!saved) return null;
                return JSON.parse(saved);
            } catch (e) { return null; }
        }

        /** 通过 API 获取歌单信息（歌曲数量 + 封面） */
        async function fetchPlaylistInfo(id) {
            const songs = await fetchMeting('playlist', id);
            if (!Array.isArray(songs) || songs.length === 0) throw new Error('歌单为空或无效');
            return {
                count: songs.length,
                cover: songs[0]?.pic ? songs[0].pic.replace('http://', 'https://') : ''
            };
        }

        /** 添加歌单 */
        async function addPlaylist(id, customName) {
            // 检查是否已存在
            if (state.savedPlaylists.find(p => p.id === id)) {
                alert('该歌单已添加');
                return;
            }
            try {
                const info = await fetchPlaylistInfo(id);
                state.savedPlaylists.push({
                    id,
                    name: customName || `歌单 ${id}`,
                    count: info.count,
                    cover: info.cover
                });
                saveSavedPlaylists();
                renderPlaylistSelect();
            } catch (e) {
                alert('添加失败：' + (e.message || '无法获取歌单信息'));
            }
        }

        /** 删除歌单（不允许删除最后一个） */
        function removePlaylist(id) {
            if (state.savedPlaylists.length <= 1) {
                alert('至少保留一个歌单');
                return;
            }
            state.savedPlaylists = state.savedPlaylists.filter(p => p.id !== id);
            saveSavedPlaylists();
            renderPlaylistSelect();
        }

        /** 加载并播放选中的歌单 */
        async function loadPlaylistById(id) {
            try {
                const data = await fetchMeting('playlist', id);
                state.playlist = Array.isArray(data) ? data : [data];
                state.currentPlaylistId = id;
                CONFIG.id = id;
                dom.playlistCount.textContent = `即将播放 ${state.playlist.length} 首歌曲`;
                dom.mobilePlaylistCount.textContent = `${state.playlist.length} 首歌曲`;
                renderPlaylist();
                loadTrack(0, true);
                // 关闭歌单选择面板
                state.showPlaylistSelect = false;
                state.showPlaylist = true;
                updateLayout();
            } catch (e) {
                alert('加载歌单失败');
            }
        }

        /** 渲染歌单选择面板（桌面端 + 移动端） */
        function renderPlaylistSelect() {
            const buildHtml = (list) => {
                if (list.length === 0) {
                    return `<div class="text-center text-white/30 py-20">
                        <i class="fas fa-music text-4xl mb-4 block"></i>
                        <p>暂无歌单，点击下方添加</p>
                    </div>`;
                }
                return list.map(p => {
                    const isActive = p.id === state.currentPlaylistId;
                    const coverSrc = p.cover || 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&auto=format&fit=crop';
                    return `
                        <div class="ps-card" data-ps-id="${p.id}">
                            <img class="ps-cover" src="${coverSrc}" onerror="this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200&auto=format&fit=crop'">
                            <div class="ps-info">
                                <div class="ps-name" style="${isActive ? 'color:var(--apple-pink)' : ''}">${p.name}</div>
                                <div class="ps-meta">${p.count} 首歌曲${isActive ? ' · 播放中' : ''}</div>
                            </div>
                            <div class="ps-actions">
                                <button class="ps-btn-play" data-action="play" data-ps-id="${p.id}">
                                    <i class="fas fa-play"></i>
                                </button>
                                <button class="ps-btn-del" data-action="delete" data-ps-id="${p.id}">
                                    <i class="fas fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('') + `
                    <div class="ps-add-card" id="ps-add-trigger">
                        <i class="fas fa-plus text-lg mr-3 text-white/40"></i>
                        <span class="text-sm font-semibold text-white/40">添加歌单</span>
                    </div>
                `;
            };

            const bindEvents = (container) => {
                container.querySelectorAll('.ps-btn-play').forEach(btn => {
                    btn.onclick = (e) => { e.stopPropagation(); loadPlaylistById(btn.dataset.psId); };
                });
                container.querySelectorAll('.ps-btn-del').forEach(btn => {
                    btn.onclick = (e) => { e.stopPropagation(); removePlaylist(btn.dataset.psId); };
                });
                const addBtn = container.querySelector('#ps-add-trigger');
                if (addBtn) addBtn.onclick = () => showAddPlaylistForm();
                // 点击卡片 = 播放
                container.querySelectorAll('.ps-card').forEach(card => {
                    card.onclick = () => loadPlaylistById(card.dataset.psId);
                });
            };

            dom.psGrid.innerHTML = buildHtml(state.savedPlaylists);
            bindEvents(dom.psGrid);
            dom.mobilePsGrid.innerHTML = buildHtml(state.savedPlaylists);
            bindEvents(dom.mobilePsGrid);
        }

        /** 显示添加歌单弹窗 */
        function showAddPlaylistForm() {
            dom.apInputId.value = '';
            dom.apInputName.value = '';
            dom.apOverlay.classList.add('visible');
            setTimeout(() => dom.apInputId.focus(), 100);
        }

        /** 隐藏添加歌单弹窗 */
        function hideAddPlaylistForm() {
            dom.apOverlay.classList.remove('visible');
        }

        /**
         * 更新页面布局
         * 桌面端：控制左右面板宽度
         * 移动端：控制封面/歌词/播放列表的切换
         */
        function updateLayout() {
            const mobile = isMobile();

            if (mobile) {
                // 移动端四选一：封面 / 歌词 / 播放列表 / 歌单选择
                dom.leftPlayer.classList.remove('mobile-lyrics-active', 'mobile-playlist-active', 'mobile-ps-active');
                dom.lyricsBtn.classList.remove('btn-active');
                dom.playlistBtn.classList.remove('btn-active');

                if (state.showLyrics) {
                    dom.leftPlayer.classList.add('mobile-lyrics-active');
                    dom.lyricsBtn.classList.add('btn-active');
                } else if (state.showPlaylistSelect) {
                    // 歌单选择：需要先激活播放列表面板容器，再叠加歌单选择
                    dom.leftPlayer.classList.add('mobile-playlist-active', 'mobile-ps-active');
                    dom.playlistBtn.classList.add('btn-active');
                } else if (state.showPlaylist) {
                    dom.leftPlayer.classList.add('mobile-playlist-active');
                    dom.playlistBtn.classList.add('btn-active');
                }
            } else {
                // 桌面端布局
                const isAnyPanelOpen = state.showLyrics || state.showPlaylist || state.showPlaylistSelect;
                if (!isAnyPanelOpen) {
                    dom.leftPlayer.classList.remove('lg:w-1/2');
                    dom.leftPlayer.classList.add('lg:w-full');
                    document.documentElement.style.setProperty('--right-width', '0%');
                } else {
                    dom.leftPlayer.classList.remove('lg:w-full');
                    dom.leftPlayer.classList.add('lg:w-1/2');
                    document.documentElement.style.setProperty('--right-width', '50%');
                }

                if (state.showLyrics) {
                    dom.lrcView.classList.remove('hidden-panel');
                    dom.lyricsBtn.classList.add('btn-active');
                } else {
                    dom.lrcView.classList.add('hidden-panel');
                    dom.lyricsBtn.classList.remove('btn-active');
                }

                if (state.showPlaylistSelect) {
                    dom.psSelectView.classList.remove('hidden-panel');
                    dom.playlistView.classList.add('hidden-panel');
                    dom.playlistBtn.classList.add('btn-active');
                } else if (state.showPlaylist) {
                    dom.playlistView.classList.remove('hidden-panel');
                    dom.psSelectView.classList.add('hidden-panel');
                    dom.playlistBtn.classList.add('btn-active');
                } else {
                    dom.playlistView.classList.add('hidden-panel');
                    dom.psSelectView.classList.add('hidden-panel');
                    dom.playlistBtn.classList.remove('btn-active');
                }
            }
        }

        /**
         * 处理下一首逻辑
         * 根据当前的播放模式（列表循环、随机、单曲循环）计算并加载下一个索引
         */
        function handleNextTrack() {
            let nextIndex = state.currentIndex;
            if (state.playMode === 'single') {
                nextIndex = state.currentIndex;
            } else if (state.playMode === 'random') {
                nextIndex = Math.floor(Math.random() * state.playlist.length);
            } else {
                nextIndex = (state.currentIndex + 1) % state.playlist.length;
            }
            loadTrack(nextIndex, true);
        }

        /**
         * 设置交互事件监听器
         * 包含点击封面播放暂停、切换面板、播放模式切换、进度条更新及歌词滚动定位
         */
        function setupEvents() {
            // 点击封面暂停/播放
            dom.cover.onclick = () => {
                if (dom.audio.paused) dom.audio.play();
                else dom.audio.pause();
            };

            // 歌词按钮
            dom.lyricsBtn.onclick = () => {
                if (isMobile()) {
                    // 移动端：toggle 模式（再点关闭回封面）
                    state.showLyrics = !state.showLyrics;
                    state.showPlaylist = false;
                    state.showPlaylistSelect = false;
                } else {
                    state.showLyrics = !state.showLyrics;
                    if (state.showLyrics) {
                        state.showPlaylist = false;
                        state.showPlaylistSelect = false;
                    }
                }
                updateLayout();
                // 显示歌词时：同步当前高亮行并滚动到该位置
                if (state.showLyrics) {
                    setTimeout(() => {
                        const lrcContent = !isMobile() ? dom.lrcContent : dom.mobileLrcContent;
                        const scrollEl = !isMobile() ? dom.lrcView : dom.mobileLrcScroll;
                        const scrollRatio = !isMobile() ? 0.4 : 0.35;
                        // 清除所有旧高亮
                        lrcContent.querySelectorAll('.lyric-line.active').forEach(el => el.classList.remove('active'));
                        // 高亮当前行并滚动
                        if (state.activeIdx >= 0) {
                            const el = lrcContent.querySelector(`[data-idx="${state.activeIdx}"]`);
                            if (el) {
                                el.classList.add('active');
                                scrollEl.scrollTo({ top: el.offsetTop - scrollEl.clientHeight * scrollRatio, behavior: 'smooth' });
                            }
                        }
                    }, 100);
                }
            };

            // 播放列表按钮
            dom.playlistBtn.onclick = () => {
                if (isMobile()) {
                    state.showPlaylist = !state.showPlaylist;
                    state.showLyrics = false;
                    state.showPlaylistSelect = false;
                } else {
                    state.showPlaylist = !state.showPlaylist;
                    if (state.showPlaylist) {
                        state.showLyrics = false;
                        state.showPlaylistSelect = false;
                    }
                }
                updateLayout();
                if (state.showPlaylist) {
                    setTimeout(() => {
                        const list = isMobile() ? dom.mobilePlaylistList : dom.playlistList;
                        const activeItem = list.querySelector('.playlist-item.active');
                        if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
            };

            // 播放模式切换：列表循环 -> 随机播放 -> 单曲循环
            const bindOrderBtn = (btn) => {
                btn.onclick = () => {
                    const modes = ['list', 'random', 'single'];
                    const icons = ['fa-repeat', 'fa-shuffle', 'fa-arrows-rotate'];
                    const titles = ['列表循环', '随机播放', '单曲循环'];
                    let currentIdx = modes.indexOf(state.playMode);
                    currentIdx = (currentIdx + 1) % modes.length;
                    state.playMode = modes[currentIdx];
                    // 同步两个按钮
                    [dom.orderBtn, dom.mobileOrderBtn].forEach(b => {
                        b.innerHTML = `<i class="fas ${icons[currentIdx]}"></i>`;
                        b.title = titles[currentIdx];
                        b.classList.add('scale-125', 'text-white');
                        setTimeout(() => b.classList.remove('scale-125', 'text-white'), 200);
                    });
                    savePlayerState(); // 保存播放模式
                };
            };
            bindOrderBtn(dom.orderBtn);
            bindOrderBtn(dom.mobileOrderBtn);

            // 播放/暂停按钮
            dom.playBtn.onclick = () => {
                if (dom.audio.paused) dom.audio.play();
                else dom.audio.pause();
            };
            // 音频播放事件：同步状态和 UI
            dom.audio.onplay = () => {
                state.isPlaying = true;
                dom.playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                dom.cover.classList.remove('paused');
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
            };
            // 音频暂停事件：同步状态和 UI
            dom.audio.onpause = () => {
                state.isPlaying = false;
                dom.playBtn.innerHTML = '<i class="fas fa-play ml-1"></i>';
                dom.cover.classList.add('paused');
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
            };
            // 时间更新事件：更新进度条、时间文字和歌词滚动
            dom.audio.ontimeupdate = () => {
                const cur = dom.audio.currentTime;
                const dur = dom.audio.duration;
                if (!dur) return;
                dom.progress.value = cur;
                dom.progress.max = dur;
                dom.progressFill.style.width = (cur / dur * 100) + '%';
                dom.timeCur.textContent = formatTime(cur);
                dom.timeTotal.textContent = formatTime(dur);
                
                // 歌词高亮滚动逻辑
                const idx = state.lyrics.findLastIndex(l => cur >= l.time);
                if (idx !== state.activeIdx && idx !== -1) {
                    // 始终更新 state.activeIdx 以跟踪当前歌词进度
                    state.activeIdx = idx;
                    // 只在歌词视图可见时更新 DOM 高亮
                    if (state.showLyrics) {
                        // 清除所有歌词行的高亮状态，防止旧高亮残留
                        const lrcContent = !isMobile() ? dom.lrcContent : dom.mobileLrcContent;
                        const scrollEl = !isMobile() ? dom.lrcView : dom.mobileLrcScroll;
                        const scrollRatio = !isMobile() ? 0.4 : 0.35;
                        lrcContent.querySelectorAll('.lyric-line.active').forEach(el => el.classList.remove('active'));
                        const activeEl = lrcContent.querySelector(`[data-idx="${idx}"]`);
                        if (activeEl) {
                            activeEl.classList.add('active');
                            scrollEl.scrollTo({ top: activeEl.offsetTop - scrollEl.clientHeight * scrollRatio, behavior: 'smooth' });
                        }
                    }
                }
            };
            // 进度条拖动事件
            dom.progress.oninput = () => { dom.audio.currentTime = dom.progress.value; };
            // 上一首/下一首按钮事件
            dom.nextBtn.onclick = handleNextTrack;
            dom.prevBtn.onclick = () => loadTrack((state.currentIndex - 1 + state.playlist.length) % state.playlist.length, true);
            // 音频自然结束事件
            dom.audio.onended = handleNextTrack;

            // ===== 歌单管理事件 =====

            // 桌面端：歌单选择按钮
            dom.psSelectBtn.onclick = () => {
                state.showPlaylistSelect = true;
                state.showPlaylist = true; // 保持面板打开
                renderPlaylistSelect();
                updateLayout();
            };
            dom.psBackBtn.onclick = () => {
                state.showPlaylistSelect = false;
                updateLayout();
            };

            // 移动端：歌单选择按钮
            dom.mobilePsSelectBtn.onclick = () => {
                state.showPlaylistSelect = true;
                renderPlaylistSelect();
                updateLayout();
            };
            dom.mobilePsBackBtn.onclick = () => {
                state.showPlaylistSelect = false;
                updateLayout();
            };

            // 添加歌单弹窗
            dom.apCancel.onclick = hideAddPlaylistForm;
            dom.apOverlay.onclick = (e) => { if (e.target === dom.apOverlay) hideAddPlaylistForm(); };
            dom.apConfirm.onclick = async () => {
                const id = dom.apInputId.value.trim();
                const name = dom.apInputName.value.trim();
                if (!id) { dom.apInputId.focus(); return; }
                dom.apConfirm.disabled = true;
                dom.apConfirm.textContent = '加载中...';
                await addPlaylist(id, name);
                dom.apConfirm.disabled = false;
                dom.apConfirm.textContent = '添加';
                hideAddPlaylistForm();
            };
            // Enter 键提交
            dom.apInputId.onkeydown = (e) => { if (e.key === 'Enter') dom.apConfirm.click(); };
            dom.apInputName.onkeydown = (e) => { if (e.key === 'Enter') dom.apConfirm.click(); };

            // 窗口大小变化时重新应用布局
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    // 清理移动端类名后重新布局
                    dom.leftPlayer.classList.remove('mobile-lyrics-active', 'mobile-playlist-active', 'mobile-ps-active');
                    state.showPlaylistSelect = false;
                    updateLayout();
                }, 150);
            });
        }

        /**
         * 秒数格式化工具函数
         * 将秒数转换为 "m:ss" 格式
         * @param {number} s - 秒数
         */
        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // 启动应用
        init();
    </script>
</body>
</html>
