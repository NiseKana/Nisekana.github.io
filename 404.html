<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>页面未找到 | Nisekana</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-gradient: linear-gradient(160deg, #0a0a0f 0%, #141428 40%, #1a1a3e 70%, #0f1525 100%);
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --accent: #818cf8;
            --accent-rgb: 129, 140, 248;
            --nav-bg: rgba(255, 255, 255, 0.04);
            --nav-border: rgba(255, 255, 255, 0.06);
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 40px rgba(0,0,0,0.25);
            --blur: blur(24px);
            --glow-color: rgba(129, 140, 248, 0.15);
            --glow-color-strong: rgba(129, 140, 248, 0.25);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(160deg, #f8f8fc 0%, #ececf0 40%, #e4e4ec 70%, #f0f0f6 100%);
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-border: rgba(255, 255, 255, 0.7);
            --card-hover: rgba(255, 255, 255, 0.7);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0, 0, 0, 0.45);
            --accent: #6366f1;
            --accent-rgb: 99, 102, 241;
            --nav-bg: rgba(0, 0, 0, 0.03);
            --nav-border: rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 40px rgba(0,0,0,0.06);
            --blur: blur(24px);
            --glow-color: rgba(99, 102, 241, 0.1);
            --glow-color-strong: rgba(99, 102, 241, 0.18);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue",
                         "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            overflow: hidden;
            transition: background 0.5s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            /*cursor: none;*/
        }

        /* ===== Cursor Glow ===== */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }
        .cursor-glow.active { opacity: 1; }

        @media (hover: none), (max-width: 768px) {
            body { cursor: auto; }
            .cursor-glow { display: none; }
        }

        /* ===== Particles ===== */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particles span {
            position: absolute;
            border-radius: 50%;
            background: rgba(var(--accent-rgb), 0.08);
            animation: float linear infinite;
        }
        .particles span:nth-child(1) { width: 6px; height: 6px; left: 10%; top: 20%; animation-duration: 18s; animation-delay: 0s; }
        .particles span:nth-child(2) { width: 4px; height: 4px; left: 25%; top: 60%; animation-duration: 22s; animation-delay: -3s; }
        .particles span:nth-child(3) { width: 8px; height: 8px; left: 45%; top: 35%; animation-duration: 16s; animation-delay: -6s; }
        .particles span:nth-child(4) { width: 3px; height: 3px; left: 65%; top: 75%; animation-duration: 24s; animation-delay: -2s; }
        .particles span:nth-child(5) { width: 5px; height: 5px; left: 80%; top: 15%; animation-duration: 20s; animation-delay: -8s; }
        .particles span:nth-child(6) { width: 7px; height: 7px; left: 55%; top: 85%; animation-duration: 19s; animation-delay: -5s; }
        .particles span:nth-child(7) { width: 4px; height: 4px; left: 90%; top: 50%; animation-duration: 21s; animation-delay: -10s; }
        .particles span:nth-child(8) { width: 6px; height: 6px; left: 35%; top: 10%; animation-duration: 17s; animation-delay: -7s; }

        @keyframes float {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(40px) scale(0.5); opacity: 0; }
        }

        /* ===== Card ===== */
        .card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 72px 48px 56px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeUp 0.6s ease both;
            overflow: hidden;
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            background: radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 50%), var(--glow-color-strong) 0%, transparent 55%);
        }
        .card.glow-active {
            border-color: rgba(var(--accent-rgb), 0.2);
            box-shadow: var(--shadow), 0 0 80px var(--glow-color);
        }
        .card.glow-active::before { opacity: 1; }
        .card > * { position: relative; z-index: 1; }

        .theme-toggle {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            background: var(--nav-bg);
            border: 1px solid var(--nav-border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            z-index: 2;
        }
        .theme-toggle:hover { background: var(--card-hover); color: var(--text-primary); }

        /* ===== Glowing 404 ===== */
        .glow-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .code {
            font-size: 9rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            color: transparent;
            background: linear-gradient(135deg, var(--accent), #c084fc, var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            position: relative;
            z-index: 1;
        }

        .code::before {
            content: '404';
            position: absolute;
            inset: 0;
            z-index: -1;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            text-align: center;
            color: var(--accent);
            filter: blur(30px);
            opacity: 0.5;
            animation: pulse 3s ease-in-out infinite;
        }

        .code::after {
            content: '404';
            position: absolute;
            inset: 0;
            z-index: -2;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            text-align: center;
            color: #c084fc;
            filter: blur(60px);
            opacity: 0.25;
            animation: pulse 3s ease-in-out 1.5s infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.35; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }

        .label {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 40px;
            letter-spacing: 0.08em;
            position: relative;
            display: inline-block;
        }
        .label::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 1px;
            animation: shimmer 2.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; width: 36px; }
            50% { opacity: 0.8; width: 56px; }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            border-radius: 14px;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .back-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.08), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .back-link:hover {
            border-color: rgba(var(--accent-rgb), 0.2);
            box-shadow: var(--shadow), 0 0 20px var(--glow-color);
        }
        .back-link:hover::before { opacity: 1; }
        .back-link svg {
            width: 16px;
            height: 16px;
            stroke: var(--accent);
            stroke-width: 2;
            fill: none;
            position: relative;
            z-index: 1;
        }
        .back-link span { position: relative; z-index: 1; }

        /* ===== Responsive ===== */
        @media (max-width: 375px) {
            body { padding: 20px 12px; cursor: auto; }
            .card { padding: 48px 20px 40px; border-radius: 20px; }
            .code { font-size: 5.5rem; }
            .code::before, .code::after { filter: blur(20px); }
            .label { font-size: 0.95rem; }
            .back-link { padding: 12px 28px; font-size: 0.82rem; }
        }

        @media (min-width: 376px) and (max-width: 480px) {
            body { cursor: auto; }
            .card { padding: 56px 28px 44px; }
            .code { font-size: 7rem; }
            .code::before, .code::after { filter: blur(24px); }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            body { cursor: auto; }
            .card { padding: 64px 40px 48px; max-width: 460px; }
            .code { font-size: 8rem; }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .card { max-width: 480px; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="particles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="card" id="errorCard">
        <button class="theme-toggle" id="themeToggle" title="切换主题">
            <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>

        <div class="glow-wrap">
            <div class="code">404</div>
        </div>
        <div class="label">页面走丢了</div>

        <div style="height: 36px;"></div>

        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            <span>返回首页</span>
        </a>
    </div>

    <script>
    (function() {
        // Theme
        var html = document.documentElement;
        var toggle = document.getElementById('themeToggle');
        var icon = document.getElementById('themeIcon');
        var sun = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        var moon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        function setTheme(t) {
            html.setAttribute('data-theme', t);
            icon.innerHTML = t === 'dark' ? sun : moon;
            localStorage.setItem('theme', t);
        }
        var saved = localStorage.getItem('theme');
        setTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
        toggle.addEventListener('click', function() {
            setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        // Cursor glow
        var glow = document.getElementById('cursorGlow');
        var card = document.getElementById('errorCard');
        var mx = 0, my = 0, gx = 0, gy = 0;
        var raf;

        function animate() {
            gx += (mx - gx) * 0.12;
            gy += (my - gy) * 0.12;
            glow.style.left = gx + 'px';
            glow.style.top = gy + 'px';
            raf = requestAnimationFrame(animate);
        }

        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', function(e) {
                mx = e.clientX;
                my = e.clientY;
                glow.classList.add('active');
                if (!raf) animate();

                var rect = card.getBoundingClientRect();
                var isInside = e.clientX >= rect.left && e.clientX <= rect.right &&
                               e.clientY >= rect.top && e.clientY <= rect.bottom;
                if (isInside) {
                    card.classList.add('glow-active');
                    card.style.setProperty('--glow-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
                    card.style.setProperty('--glow-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
                } else {
                    card.classList.remove('glow-active');
                }
            });

            document.addEventListener('mouseleave', function() {
                glow.classList.remove('active');
                card.classList.remove('glow-active');
            });
        }
    })();
    </script>
</body>
</html>
