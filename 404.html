<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>页面未找到 | Nisekana</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/index.css">
    <style>
        /* ===== 404-specific: Layout ===== */
        body {
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        /* ===== 404-specific: Glass Card ===== */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(1.8);
            -webkit-backdrop-filter: blur(15px) saturate(1.8);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.6s ease;
        }

        .content {
            text-align: center;
            max-width: 440px;
            width: 100%;
            padding: 56px 36px 44px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* ===== 404-specific: Glow — Orange-Yellow ===== */
        .glow-wrap {
            position: relative;
            margin-bottom: 12px;
            overflow: visible;
        }
        .code {
            font-size: 7.5rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            position: relative;
            z-index: 1;
            color: transparent;
        }
        /* 渐变文字 */
        .code::before {
            content: '404';
            position: absolute;
            inset: 0;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            text-align: center;
            background: linear-gradient(135deg, #f5a623, #f7c948, #f5a623);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease infinite;
            z-index: 2;
        }
        /* 微弱光芒 — 内层柔光 */
        .code::after {
            content: '404';
            position: absolute;
            inset: 0;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            text-align: center;
            color: #f5a623;
            filter: blur(20px);
            opacity: 0.35;
            animation: pulse 3s ease-in-out infinite;
            z-index: 1;
        }
        /* 外层扩散光芒 */
        .glow-outer {
            position: absolute;
            inset: 0;
            font-size: 7.5rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            text-align: center;
            color: #f7c948;
            filter: blur(50px);
            opacity: 0.18;
            animation: pulse 3s ease-in-out 1.5s infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.18; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.02); }
        }

        .label {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 36px;
            letter-spacing: 0.06em;
        }

        /* ===== 404-specific: Back Button ===== */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 28px;
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px) saturate(1.6);
            -webkit-backdrop-filter: blur(12px) saturate(1.6);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .back-btn:hover {
            background: var(--glass-hover);
            color: var(--text-primary);
            box-shadow: 0 0 18px rgba(var(--accent-rgb), 0.25), 0 0 4px rgba(var(--accent-rgb), 0.12);
        }
        .back-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(
                80px circle at var(--mx, 50%) var(--my, 50%),
                rgba(var(--accent-rgb), 0.3) 0%,
                rgba(var(--accent-rgb), 0.08) 40%,
                transparent 70%
            );
            opacity: var(--glow, 0);
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .back-btn i, .back-btn span { position: relative; z-index: 1; }
        .back-btn i { color: var(--accent); font-size: 14px; }

        /* ===== 404 Responsive ===== */
        @media (max-width: 375px) {
            body { padding: 24px 14px; }
            .content { padding: 40px 20px 32px; }
            .code, .glow-outer { font-size: 5rem; }
            .code::after { filter: blur(14px); }
            .glow-outer { filter: blur(30px); }
            .label { font-size: 0.9rem; margin-bottom: 28px; }
            .back-btn { padding: 10px 22px; font-size: 0.8rem; }
        }
        @media (min-width: 376px) and (max-width: 480px) {
            .code, .glow-outer { font-size: 6rem; }
            .code::after { filter: blur(16px); }
            .glow-outer { filter: blur(40px); }
        }
        @media (min-width: 481px) and (max-width: 768px) { .code, .glow-outer { font-size: 7rem; } }
        @media (min-width: 769px) {
            .code, .glow-outer { font-size: 8.5rem; }
            .content { padding: 64px 44px 48px; }
        }
    </style>
</head>
<body>

    <div class="particles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span>
    </div>

    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="fa-solid fa-sun" id="themeIcon"></i>
    </button>

    <div class="content glass">
        <div class="glow-wrap">
            <div class="glow-outer">404</div>
            <div class="code">404</div>
        </div>
        <div class="label">页面走丢了</div>
        <a href="/" class="back-btn">
            <span>返回首页</span>
        </a>
    </div>

    <script src="/assets/js/index.js"></script>
    <script>
    (function() {
        // ===== 404-specific: 10s Auto Redirect =====
        var countdown = 10;
        var label = document.querySelector('.label');
        var originalText = label.textContent;
        label.textContent = originalText + ' (' + countdown + 's)';
        var timer = setInterval(function() {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            } else {
                label.textContent = originalText + ' (' + countdown + 's)';
            }
        }, 1000);

        // ===== 404-specific: Back Button Glow (match index style) =====
        function addBtnGlow(el) {
            el.addEventListener('mousemove', function(e) {
                var rect = el.getBoundingClientRect();
                el.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                el.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                el.style.setProperty('--glow', '1');
            });
            el.addEventListener('mouseleave', function() {
                el.style.setProperty('--glow', '0');
            });
        }
        document.querySelectorAll('.back-btn').forEach(addBtnGlow);
    })();
    </script>
</body>
</html>
